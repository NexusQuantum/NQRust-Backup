Director {
  Name = "nqrustbackup-dir"
  Messages = "Daemon"
  QueryFile = "/usr/lib/nqrustbackup/scripts/query.sql"
  MaximumConcurrentJobs = 10
  Password = "[md5]1499042c6de7a645bcb4c21f3e05dc3a"
  Auditing = yes
}

Client {
  Name = "nqrustbackup-fd"
  Description = "Client resource of the Director itself."
  Address = "localhost"
  Password = "[md5]97a3419152ff86bedac46016e0c97271"
}

JobDefs {
  Name = "DefaultJob"
  Type = Backup
  Level = Incremental
  Messages = "Standard"
  Storage = "File"
  Pool = "Incremental"
  FullBackupPool = "Full"
  IncrementalBackupPool = "Incremental"
  DifferentialBackupPool = "Differential"
  Client = "nqrustbackup-fd"
  FileSet = "SelfTest"
  Schedule = "WeeklyCycle"
  WriteBootstrap = "/var/lib/nqrustbackup/%c.bsr"
}

Job {
  Name = "RestoreFiles"
  Description = "Standard Restore template. Only one such job is needed for all standard Jobs/Clients/Storage ..."
  Type = Restore
  Messages = "Standard"
  Storage = "File"
  Pool = "Incremental"
  Client = "nqrustbackup-fd"
  FileSet = "LinuxAll"
  Where = "/tmp/nqrustbackup-restores"
}

Job {
  Name = "BackupCatalog"
  Description = "Backup the catalog database (after the nightly save)"
  Level = Full
  FileSet = "Catalog"
  Schedule = "WeeklyCycleAfterBackup"
  JobDefs = "DefaultJob"
  WriteBootstrap = "|/usr/bin/nqrustbackup_smtp -h localhost -f "(NQRustBackup) " -s "Bootstrap for Job %j" root"
  Priority = 11
}

Job {
  Name = "backup-nqrustbackup-fd"
  Client = "nqrustbackup-fd"
  JobDefs = "DefaultJob"
}

Storage {
  Name = "File"
  Address = "vagrant"
  Password = "[md5]4f389409b83d78959bc9fd95292fb63a"
  Device = "FileStorage"
  MediaType = "File"
}

Catalog {
  Name = "MyCatalog"
  DbPassword = "8XZyLgZBx4kS"
  DbUser = "nqrustbackup"
  DbName = "nqrustbackup"
}

Schedule {
  Name = "WeeklyCycle"
  run = Full 1st Sat at 21:00
  run = Differential 2nd-5th Sat at 21:00
  run = Incremental Mon-Fri at 21:00
}

Schedule {
  Name = "WeeklyCycleAfterBackup"
  Description = "This schedule does the catalog. It starts after the WeeklyCycle."
  run = Full Mon-Fri at 21:10
}

FileSet {
  Name = "Windows All Drives"
  Include {
    Options {
      Signature = MD5
      IgnoreCase = Yes
      Exclude = Yes
      AclSupport = Yes
      XattrSupport = Yes
      Wild Dir = "[A-Z]:/RECYCLER"
      Wild Dir = "[A-Z]:/$RECYCLE.BIN"
      Wild Dir = "[A-Z]:/System Volume Information"
      Wild File = "[A-Z]:/pagefile.sys"
      Drive Type = "fixed"
    }
    File = "/"
  }
}

FileSet {
  Name = "SelfTest"
  Description = "fileset just to backup some files for selftest"
  Include {
    Options {
      Signature = MD5
      AclSupport = Yes
      XattrSupport = Yes
    }
    File = "/usr/sbin"
  }
}

FileSet {
  Name = "LinuxAll"
  Description = "Backup all regular filesystems, determined by filesystem type."
  Include {
    Options {
      Signature = MD5
      OneFS = No
      AclSupport = Yes
      XattrSupport = Yes
      Fs Type = "btrfs"
      Fs Type = "ext2"
      Fs Type = "ext3"
      Fs Type = "ext4"
      Fs Type = "reiserfs"
      Fs Type = "jfs"
      Fs Type = "xfs"
      Fs Type = "zfs"
    }
    File = "/"
  }
  Exclude {
    File = "/var/lib/nqrustbackup"
    File = "/var/lib/nqrustbackup/storage"
    File = "/proc"
    File = "/tmp"
    File = "/var/tmp"
    File = "/.journal"
    File = "/.fsck"
  }
}

FileSet {
  Name = "Catalog"
  Description = "Backup the catalog dump and NQRustBackup configuration files."
  Include {
    Options {
      Signature = MD5
      AclSupport = Yes
      XattrSupport = Yes
    }
    File = "/var/lib/nqrustbackup/nqrustbackup.sql"
    File = "/etc/nqrustbackup"
  }
}

Pool {
  Name = "Scratch"
  PoolType = Scratch
}

Pool {
  Name = "Incremental"
  PoolType = Backup
  LabelFormat = "Incremental-"
  MaximumVolumes = 100
  MaximumVolumeBytes = 1 g
  VolumeRetention = 1 months
}

Pool {
  Name = "Full"
  PoolType = Backup
  LabelFormat = "Full-"
  MaximumVolumes = 100
  MaximumVolumeBytes = 50 g
}

Pool {
  Name = "Differential"
  PoolType = Backup
  LabelFormat = "Differential-"
  MaximumVolumes = 100
  MaximumVolumeBytes = 10 g
  VolumeRetention = 3 months
}

Messages {
   Name = "Standard"
   MailCommand = "/usr/bin/nqrustbackup_smtp -h localhost -f \"\(NQRustBackup\) \<%r\>\" -s \"NQRustBackup: %t %e of %c %l\" %r"
   OperatorCommand = "/usr/bin/nqrustbackup_smtp -h localhost -f \"\(NQRustBackup\) \<%r\>\" -s \"NQRustBackup: Intervention needed for %j\" %r"
   catalog = all,!saved,!skipped,!audit
   append = /var/log/nqrustbackup/nqrustbackup.log = all,!saved,!skipped,!audit
   console = all,!saved,!skipped,!audit
   mail = root = all,!saved,!skipped,!audit
   operator = root = mount
}

Messages {
   Name = "Daemon"
   MailCommand = "/usr/bin/nqrustbackup_smtp -h localhost -f \"\(NQRustBackup\) \<%r\>\" -s \"NQRustBackup daemon message\" %r"
   append = /var/log/nqrustbackup/nqrustbackup-audit.log = audit
   append = /var/log/nqrustbackup/nqrustbackup.log = all,!skipped,!audit
   console = all,!saved,!skipped,!audit
   mail = root = all,!skipped,!audit
}

