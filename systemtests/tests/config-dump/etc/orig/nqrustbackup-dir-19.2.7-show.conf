  ClientACL = "*all*"
  StorageACL = "*all*"
  ScheduleACL = "*all*"
  PoolACL = "*all*"
  CommandACL = ".api",".help","use","version","status","list","llist",".clients",".jobs",".filesets",".pools",".storages",".defaults",".schedule",".bvfs_lsdirs",".bvfs_lsfiles",".bvfs_update",".bvfs_get_jobids",".bvfs_versions",".bvfs_restore"
  FileSetACL = "*all*"
  CatalogACL = "*all*"
  WhereACL = "*all*"
}

