name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist on the repo.'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: installer
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings

  build-binary:
    name: Build static musl binary (x86_64)
    needs: ci-gate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: installer
    outputs:
      binary_name: ${{ steps.rename.outputs.name }}
      sha256: ${{ steps.checksum.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            installer/target/
          key: ${{ runner.os }}-musl-cargo-${{ hashFiles('installer/Cargo.lock', 'installer/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-musl-cargo-

      - name: cargo build --target=x86_64-unknown-linux-musl
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Verify static link
        run: |
          file target/x86_64-unknown-linux-musl/release/nqrustbackup-installer
          # Should print "statically linked" — fail loudly if not
          file target/x86_64-unknown-linux-musl/release/nqrustbackup-installer | grep -E 'static.*linked'

      - name: Smoke test the static binary
        run: |
          ./target/x86_64-unknown-linux-musl/release/nqrustbackup-installer --version
          ./target/x86_64-unknown-linux-musl/release/nqrustbackup-installer plan \
              --source upstream-compat --profile all-in-one
          ./target/x86_64-unknown-linux-musl/release/nqrustbackup-installer install --dry-run

      - name: Rename for release
        id: rename
        run: |
          NAME="nqrustbackup-installer-x86_64-linux-musl"
          cp target/x86_64-unknown-linux-musl/release/nqrustbackup-installer "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: SHA-256 checksum
        id: checksum
        run: |
          NAME="${{ steps.rename.outputs.name }}"
          sha256sum "$NAME" | tee "${NAME}.sha256"
          SHA=$(awk '{print $1}' "${NAME}.sha256")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nqrustbackup-installer-x86_64-linux-musl
          path: |
            installer/nqrustbackup-installer-x86_64-linux-musl
            installer/nqrustbackup-installer-x86_64-linux-musl.sha256
          retention-days: 7
          if-no-files-found: error

  package-webui:
    name: Package NQRustBackup WebUI tarball
    runs-on: ubuntu-24.04
    outputs:
      name: ${{ steps.pack.outputs.name }}
      sha256: ${{ steps.pack.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Render CMake .in templates with proper @VAR@ substitution
        run: |
          # The webui's view templates ship as .phtml AND .phtml.in in the
          # repo, but .phtml is .gitignore'd because CMake generates it.
          # .phtml.in files have no @VAR@ tokens — just rename.
          # version.php.in DOES use @VERSION_STRING@ — substitute it.
          cd webui
          # Pull the version from the tag (or default to a sensible string).
          VER="${GITHUB_REF#refs/tags/v}"
          [ -z "$VER" ] || [ "$VER" = "$GITHUB_REF" ] && VER="0.0.0-dev"
          echo "rendering with VERSION_STRING=$VER"
          find module -name '*.phtml.in' | while read -r f; do
              cp "$f" "${f%.in}"
          done
          if [ -f version.php.in ]; then
              sed "s|@VERSION_STRING@|$VER|g; s|@PHP@|/usr/bin/php|g" version.php.in > version.php
          fi
          # Belt-and-braces: substitute any remaining @VAR@ in .php files
          # under module/ and vendor/ — these would otherwise be sent verbatim
          # in the bareos protocol Hello and the director would reject them.
          find module vendor -type f \( -name '*.php' -o -name '*.phtml' \) \
            -exec sed -i "s|@VERSION_STRING@|$VER|g; s|@PHP@|/usr/bin/php|g" {} +

      - name: Pack webui/ as nqrustbackup-webui.tar.gz
        id: pack
        run: |
          NAME="nqrustbackup-webui.tar.gz"
          tar czf "$NAME" \
              -C webui \
              --exclude='./tests' \
              --exclude='./cmake' \
              --exclude='./CMakeLists.txt' \
              --exclude='./LICENSE' \
              --exclude='./README.md' \
              --exclude='./copyright' \
              --exclude='./doc' \
              .
          ls -la "$NAME"
          # Sanity: the tarball must contain the rebranded layout.phtml
          if ! tar tzf "$NAME" | grep -q '^./module/Application/view/layout/layout.phtml$'; then
              echo "ERROR: tarball missing module/Application/view/layout/layout.phtml" >&2
              exit 1
          fi
          sha256sum "$NAME" | tee "${NAME}.sha256"
          SHA=$(awk '{print $1}' "${NAME}.sha256")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Upload webui artifact
        uses: actions/upload-artifact@v4
        with:
          name: nqrustbackup-webui
          path: |
            nqrustbackup-webui.tar.gz
            nqrustbackup-webui.tar.gz.sha256
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-binary, package-webui]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: nqrustbackup-installer-x86_64-linux-musl
          path: dist/

      - name: Download webui artifact
        uses: actions/download-artifact@v4
        with:
          name: nqrustbackup-webui
          path: dist/

      - name: Show artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/nqrustbackup-installer-x86_64-linux-musl
            dist/nqrustbackup-installer-x86_64-linux-musl.sha256
            dist/nqrustbackup-webui.tar.gz
            dist/nqrustbackup-webui.tar.gz.sha256
          body: |
            # NQRustBackup Installer ${{ steps.tag.outputs.name }}

            Static `x86_64-linux-musl` build of the NQRustBackup Rust TUI installer.

            ## Quick install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/scripts/install.sh | sudo bash
            ```

            That downloads the binary attached to this release and launches `install` against your host.

            ## Manual download

            ```bash
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/nqrustbackup-installer-x86_64-linux-musl
            chmod +x nqrustbackup-installer-x86_64-linux-musl
            sudo ./nqrustbackup-installer-x86_64-linux-musl
            ```

            ## Checksum

            ```
            ${{ needs.build-binary.outputs.sha256 }}  nqrustbackup-installer-x86_64-linux-musl
            ```

            ## What it installs

            See [`installer/README.md`](https://github.com/${{ github.repository }}/blob/master/installer/README.md) — by default deploys Director + Storage + FileDaemon + PostgreSQL catalog + WebUI in one host (~5 min on Ubuntu 24.04).
