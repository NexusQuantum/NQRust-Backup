
# nqrustbackup-fd.conf
Director {
  Name = <name>
  Password = <password>
  Allowed Script Dir = "/etc/nqrustbackup"
  Allowed Script Dir = "/path/that/is/also/allowed"
}



# nqrustbackup-dir.conf
Job {
   Name = "<name>"
   JobDefs = "DefaultJob"
   Client Run Before Job = "/etc/nqrustbackup/runbeforejob.sh"   # this will run
   Client Run Before Job = "/tmp/runbeforejob.sh"          # this will be blocked
}
